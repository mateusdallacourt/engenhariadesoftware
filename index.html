    let questoesEmbaralhadas = [];
    let indiceAtual = 0;
    let acertos = 0;
    let listaDeErros = [];

    // ====== FUNÇÕES DO RANKING ======
    function verRanking() {
        document.getElementById('tela-inicial').style.display = 'none';
        document.getElementById('ranking-tela').style.display = 'block';
        document.getElementById('ranking-lista').innerHTML = "⏳ Carregando dados da planilha...";

        fetch(URL_DA_PLANILHA)
            .then(response => response.json())
            .then(data => {
                if (data.length === 0) {
                    document.getElementById('ranking-lista').innerHTML = "<p style='text-align:center;'>Nenhum aluno fez o teste ainda.</p>";
                    return;
                }

                let html = "<table style='width:100%; border-collapse: collapse; margin-top:20px; text-align: left;'>";
                html += "<tr style='background-color:#3498db; color:white;'><th style='padding:12px; border-radius: 8px 0 0 0;'>Posição</th><th>Nome</th><th style='border-radius: 0 8px 0 0;'>Nota</th></tr>";
                
                data.forEach((aluno, index) => {
                    let medalha = (index + 1) + "º";
                    if (index === 0) medalha = "🥇 1º";
                    else if (index === 1) medalha = "🥈 2º";
                    else if (index === 2) medalha = "🥉 3º";

                    let corFundo = index % 2 === 0 ? '#f9f9f9' : '#fff';
                    html += `<tr style='border-bottom: 1px solid #ddd; background-color: ${corFundo};'>
                                <td style='padding:12px; font-weight: bold; color: #2c3e50;'>${medalha}</td>
                                <td style='padding:12px; color: #333;'>${aluno.nome}</td>
                                <td style='padding:12px; font-weight: bold; color: #27ae60;'>${Number(aluno.nota).toFixed(1)}</td>
                             </tr>`;
                });
                html += "</table>";
                document.getElementById('ranking-lista').innerHTML = html;
            })
            .catch(error => {
                document.getElementById('ranking-lista').innerHTML = "<p style='color:red; text-align:center;'>⚠️ Erro ao carregar o ranking.</p>";
            });
    }

    function voltarInicio() {
        document.getElementById('ranking-tela').style.display = 'none';
        document.getElementById('tela-inicial').style.display = 'block';
    }

    // ====== FUNÇÕES DO QUIZ ======
    function comecarTeste() {
        let inputBox = document.getElementById('input-nome-aluno');
        if (inputBox.value.trim() === "") { alert("⚠️ Por favor, digite seu nome antes de começar!"); return; }
        nomeDoAluno = inputBox.value.trim();
        document.getElementById('tela-inicial').style.display = 'none';
        document.getElementById('quiz-tela').style.display = 'block';
        iniciarQuiz();
    }

    function embaralharArray(array) {
        let arrayCopia = [...array];
        for (let i = arrayCopia.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arrayCopia[i], arrayCopia[j]] = [arrayCopia[j], arrayCopia[i]];
        }
        return arrayCopia;
    }

    function iniciarQuiz() {
        questoesEmbaralhadas = embaralharArray(bancoDeQuestoes);
        renderizarQuestao();
    }

    function renderizarQuestao() {
        const questaoAtual = questoesEmbaralhadas[indiceAtual];
        const container = document.getElementById('questao-container');
        document.getElementById('progresso-texto').innerText = `Questão ${indiceAtual + 1} de ${questoesEmbaralhadas.length}`;
        document.getElementById('progresso-preenchimento').style.width = `${((indiceAtual) / questoesEmbaralhadas.length) * 100}%`;

        let htmlDiv = `<div class="enunciado">${questaoAtual.enunciado}</div>`;
        
        let alternativasEmbaralhadas = embaralharArray(questaoAtual.opcoes);
        
        alternativasEmbaralhadas.forEach((opcao) => { 
            htmlDiv += `<label class="opcao-label"><input type="radio" name="resposta" value="${opcao}"> ${opcao}</label>`; 
        });
        container.innerHTML = htmlDiv;

        const btn = document.getElementById('btn-proxima');
        if (indiceAtual === questoesEmbaralhadas.length - 1) {
            btn.innerText = "Finalizar Teste ✔️"; btn.style.backgroundColor = "#27ae60";
        }
    }

    function avancarQuestao() {
        const opcoes = document.getElementsByName('resposta');
        let respostaSelecionada = null;
        for (let opcao of opcoes) { if (opcao.checked) { respostaSelecionada = opcao.value; break; } }
        
        if (!respostaSelecionada) { alert("⚠️ Selecione uma alternativa para continuar!"); return; }

        if (respostaSelecionada === questoesEmbaralhadas[indiceAtual].respostaCorreta) { 
            acertos++; 
        } else {
            listaDeErros.push({
                pergunta: questoesEmbaralhadas[indiceAtual].enunciado,
                respostaCerta: questoesEmbaralhadas[indiceAtual].respostaCorreta // Mantido no script, mas não será exibido na tela
            });
        }

        indiceAtual++;
        if (indiceAtual < questoesEmbaralhadas.length) { renderizarQuestao(); } 
        else { finalizarQuiz(); }
    }

    function finalizarQuiz() {
        document.getElementById('quiz-tela').style.display = 'none';
        document.getElementById('resultado-container').style.display = 'block';

        const totalQuestoes = questoesEmbaralhadas.length;
        
        const notaDeZeroADez = ((acertos / totalQuestoes) * 10).toFixed(1).replace('.', ','); 
        const porcentagem = Math.round((acertos / totalQuestoes) * 100);    
        
        let mensagemHtml = `
            <h2>Teste Concluído!</h2>
            <div class="nome-destaque">Aluno(a): <strong>${nomeDoAluno}</strong></div>
            <div class="nota-final-destaque">${notaDeZeroADez} / 10,0</div>
            <div class="estatisticas">Acertos: ${acertos} de ${totalQuestoes} (${porcentagem}%)</div>
        `;

        // ========================================================
        // AQUI ESTÁ A ALTERAÇÃO: MOSTRAR SÓ A PERGUNTA, SEM A RESPOSTA
        // ========================================================
        if (listaDeErros.length > 0) {
            let errosHtml = `<div class="lista-erros" style="display: block;"><h3>Questões que você errou (Revise e tente novamente):</h3>`;
            listaDeErros.forEach(erro => {
                errosHtml += `<div class="erro-item"><div class="erro-pergunta">❌ ${erro.pergunta}</div></div>`;
            });
            errosHtml += `</div>`;
            mensagemHtml += errosHtml;
        } else {
            mensagemHtml += `<p style="color: #27ae60; font-weight: bold; margin-top:20px; font-size: 18px;">Parabéns! Você gabaritou a prova! 🏆</p>`;
        }

        document.getElementById('conteudo-resultado').innerHTML = mensagemHtml;

        // Salvamento na Planilha
        let dados = new URLSearchParams();
        dados.append("nome", nomeDoAluno);
        dados.append("nota", notaDeZeroADez); 
        dados.append("porcentagem", porcentagem + "%");

        fetch(URL_DA_PLANILHA, {
            method: "POST",
            body: dados,
            mode: "no-cors"
        }).then(() => {
            document.getElementById('status-salvamento').style.display = 'none';
            document.getElementById('sucesso-salvamento').style.display = 'block';
        }).catch(error => {
            document.getElementById('status-salvamento').innerText = "⚠️ Houve um erro de conexão, mas sua nota foi processada localmente.";
        });
    }
</script>
